repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^src-tauri/capabilities/.*\.json$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: leakage-scan
        name: Internal-workflow leakage scan
        entry: scripts/scan-leakage.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: Conventional Commits validation
        entry: pnpm exec commitlint --edit
        language: system
        stages: [commit-msg]
        pass_filenames: true
