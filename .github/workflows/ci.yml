name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: short
  CARGO_TERM_COLOR: always

jobs:
  leakage-scan:
    name: leakage scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Scan diff against main
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE_REF" --depth=1
            BASE_SHA="$(git rev-parse origin/$BASE_REF)"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          # Stage the diff against the base so scan-leakage sees the same input
          # it would in a local pre-commit run.
          if [ -n "$BASE_SHA" ] && git rev-parse --quiet --verify "$BASE_SHA" >/dev/null; then
            git diff --name-only "$BASE_SHA"...HEAD | xargs -I{} git add -- {} || true
          else
            git add -A
          fi
          scripts/scan-leakage.sh

  identity-strings-scan:
    name: identity strings scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Scan user-facing strings for Thalyn identity
        shell: bash
        run: scripts/scan-identity-strings.sh

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    env:
      # Vite + Monaco + the lazy-loaded editor chunk (~4 MB minified)
      # push memory pressure past Node's 2 GB default during the
      # production build. 4 GB is well within the 7 GB the
      # ubuntu-latest runners ship with.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm build

  storybook:
    name: storybook a11y
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build-storybook --quiet
      - name: Run a11y test runner
        run: |
          pnpm dlx http-server storybook-static --port 6006 --silent &
          pnpm dlx wait-on http://127.0.0.1:6006
          pnpm exec test-storybook --url http://127.0.0.1:6006

  visual:
    name: visual regression smoke
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - name: Visual smoke (snapshot baselines are platform-keyed; the
          Linux baselines populate on first run via the dedicated
          baseline workflow)
        run: pnpm exec playwright test --ignore-snapshots
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test (lib only — sidecar round-trip is gated by uv)
        working-directory: src-tauri
        run: cargo test --lib -- --skip pings_real_sidecar

  python:
    name: brain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy
      - run: uv run pytest
